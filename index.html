<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهمة عاجلة - وزارة التعليم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007078;
            --accent-color: #d4af37;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .container {
            width: 95%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid var(--primary-color);
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 1.4rem; }

        .timer-box {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .question-box { margin-bottom: 20px; text-align: right; }
        
        /* تحسين اختيار الإجابات للهواتف */
        label {
            display: block;
            background: #f9f9f9;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        input[type="radio"] { margin-left: 10px; transform: scale(1.2); }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
        }

        #userName {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div id="setup">
        <h2>مهمة عاجلة جداً</h2>
        <p>أدخل اسمك للبدء في المهمة:</p>
        <input type="text" id="userName" placeholder="الاسم الكريم...">
        <button onclick="startMission()">قبول المهمة</button>
    </div>

    <div id="quiz" style="display: none;">
        <h3 id="welcome-msg"></h3>
        <div class="timer-box">
            <i class="fas fa-clock"></i> <span id="timer">10</span> ثوانٍ
        </div>
        <hr>
        <div id="question-container" class="question-box"></div>
        <button onclick="nextQuestion()">السؤال التالي</button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>النتيجة النهائية</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
</div>

<script>
    const questions = [
        { q: "ما هو اللون الأساسي لشعار وزارة التعليم الحالي؟", options: ["أزرق", "أخضر زيتوني", "أحمر"], correct: 1 },
        { q: "كم تبلغ مدة رؤية المملكة العربية السعودية؟", options: ["2025", "2030", "2040"], correct: 1 },
        { q: "المادة التي تدرس بنية الأرض تسمى؟", options: ["الفيزياء", "الجيولوجيا", "الكيمياء"], correct: 1 },
        { q: "ما هي عاصمة المملكة العربية السعودية؟", options: ["جدة", "الدمام", "الرياض"], correct: 2 },
        { q: "تعتبر القراءة وسيلة لـ...؟", options: ["تغذية العقل", "إضاعة الوقت", "النوم"], correct: 0 },
        { q: "المواطنة الرقمية تهدف إلى الاستخدام الـ... للتقنية:", options: ["المفرط", "الآمن والمسؤول", "العشوائي"], correct: 1 },
        { q: "أهم خطوة لحماية حساباتك هي استخدام كلمة مرور:", options: ["سهلة", "قوية ومتغيرة", "تاريخ ميلادك"], correct: 1 },
        { q: "عند مشاهدة محتوى يسيء للوطن نقوم بـ:", options: ["تجاهله", "الإبلاغ عنه", "نشره"], correct: 1 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 10;

    function startMission() {
        const name = document.getElementById('userName').value;
        if (!name) return alert("يرجى إدخال الاسم أولاً");
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `يا ${name}، هذه المهمة عاجلة ومهمة جداً!`;
        loadQuestion();
    }

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 10;
        document.getElementById('timer').innerText = timeLeft;
        const qData = questions[currentQuestionIndex];
        let html = `<p><b>س${currentQuestionIndex + 1}:</b> ${qData.q}</p>`;
        qData.options.forEach((opt, index) => {
            html += `<label><input type="radio" name="answer" value="${index}"> ${opt}</label>`;
        });
        document.getElementById('question-container').innerHTML = html;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) { nextQuestion(); }
        }, 1000);
    }

    function nextQuestion() {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (selected && parseInt(selected.value) === questions[currentQuestionIndex].correct) {
            score++;
        }
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        clearInterval(timer);
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `لقد أنجزت ${score} من أصل ${questions.length} أسئلة بنجاح.`;
    }
</script>
</body>
</html>
