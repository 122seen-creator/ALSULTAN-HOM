<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهمة الوطنية: المواطنة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --moe-green: #00816a;
            --alert-red: #e63946;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-top: 10px solid var(--moe-green);
            text-align: center;
            position: relative;
        }

        .timer-display {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--alert-red);
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .screen { display: none; animation: fadeIn 0.4s; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-moe {
            background: var(--moe-green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .option-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            text-align: right;
            width: 100%;
            font-family: 'Cairo';
            transition: 0.2s;
        }

        .option-btn:hover { border-color: var(--moe-green); background: #f0fdfa; }

        .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--moe-green); transition: 0.3s; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="timer-display" id="timer">15</div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundjay.com/free-music/iron-man-heart-beat-1.mp3" type="audio/mpeg">
    </audio>

    <div class="screen active" id="step1">
        <img src="https://upload.wikimedia.org/wikipedia/ar/1/11/Logo_of_Ministry_of_Education_%28Saudi_Arabia%29.svg" width="160">
        <h2>تحدي المواطنة الرقمية</h2>
        <input type="text" id="stdName" placeholder="أدخل اسمك الثلاثي" style="width:100%; padding:12px; margin-top:15px; border-radius:8px; border:1px solid #ccc; text-align:center; font-family:'Cairo';">
        <button class="btn-moe" onclick="toStep2()">دخول النظام</button>
    </div>

    <div class="screen" id="step2">
        <h2 style="color:var(--alert-red)">⚠️ نداء عاجل</h2>
        <p id="msg"></p>
        <p>الأمن السيبراني للمدرسة مهدد، هل أنت مستعد لاتخاذ قرارات حاسمة؟</p>
        <button class="btn-moe" onclick="startSim()">قبول المهمة (ابدأ)</button>
    </div>

    <div class="screen" id="step3">
        <h3 id="qText"></h3>
        <div id="options"></div>
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    </div>

    <div class="screen" id="step4">
        <h2 style="color:var(--moe-green)">اكتملت المهمة 🏁</h2>
        <p>شكراً لك يا بطل. اضغط الزر أدناه لإرسال تقريرك للأستاذ سلطان.</p>
        <button class="btn-moe" id="submitBtn" onclick="sendResults()">إرسال النتائج الآن</button>
        <p id="status" style="margin-top:15px; font-weight:bold; color:var(--moe-green)"></p>
    </div>
</div>

<script>
    let name = "", current = 0, timer, sec = 15, results = [];
    const questions = [
        { q: "رصدت انتحال شخصية معلمك في تلجرام يطلب بياناتك..", opts: ["إرسال البيانات", "تجاهله وإبلاغ المدرسة", "الاستفسار منه"] },
        { q: "تطبيق يعدك بتغيير درجاتك مقابل رسوم..", opts: ["تجربة التطبيق", "الحذر منه والابتعاد", "مشاركته مع الزملاء"] },
        { q: "نشر صور لزميلك دون إذن منه يعتبر خرقاً لـ:", opts: ["الخصوصية والتنمر", "حرية الرأي", "التواصل الاجتماعي"] },
        { q: "وجدت محتوى يسيء للوطن، تصرفك هو:", opts: ["الرد بمسبات", "تجاهله", "الإبلاغ عبر 'كلنا أمن'"] },
        { q: "استخدام مقاطع الآخرين في بحثك يتطلب:", opts: ["نسبها لنفسك", "ذكر المصدر", "نشرها كما هي"] }
    ];

    function toStep2() {
        name = document.getElementById('stdName').value;
        if(!name) return alert("أدخل اسمك!");
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('msg').innerText = `يا بطل: ${name}، أنت في مهمة رسمية!`;
    }

    function startSim() {
        document.getElementById('bgMusic').play();
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.add('active');
        document.getElementById('timer').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        if(current >= questions.length) return end();
        sec = 15;
        document.getElementById('timer').innerText = sec;
        document.getElementById('qText').innerText = questions[current].q;
        const div = document.getElementById('options');
        div.innerHTML = "";
        questions[current].opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "option-btn";
            b.innerText = o;
            b.onclick = () => { results.push({q:questions[current].q, a:o}); current++; loadQ(); };
            div.appendChild(b);
        });
        document.getElementById('pFill').style.width = (current/questions.length)*100 + "%";
        clearInterval(timer);
        timer = setInterval(() => {
            sec--; document.getElementById('timer').innerText = sec;
            if(sec<=0) { results.push({q:questions[current].q, a:"لم يجب"}); current++; loadQ(); }
        }, 1000);
    }

    function end() {
        clearInterval(timer);
        document.getElementById('timer').style.display = 'none';
        document.getElementById('step3').classList.remove('active');
        document.getElementById('step4').classList.add('active');
    }

    async function sendResults() {
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "جاري الإرسال...";

        // تجهيز البيانات لإرسالها
        const formData = new FormData();
        formData.append("اسم الطالب", name);
        results.forEach((r, i) => formData.append(`سؤال ${i+1}`, `${r.q} -> الإجابة: ${r.a}`));

        try {
            // استبدل الرابط أدناه برابط Formspree الخاص بك
            const response = await fetch("https://formspree.io/f/xpqkqzbg", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                status.innerText = "✅ تم استلام تقريرك بنجاح يا بطل!";
                btn.innerText = "تم الإرسال";
            } else {
                throw new Error();
            }
        } catch (error) {
            status.innerText = "❌ حدث خطأ، يمكنك تصوير الشاشة وإرسالها للأستاذ.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
